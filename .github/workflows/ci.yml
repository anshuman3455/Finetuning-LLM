name: AI MCP Assistant CI/CD

on:
push:
branches: [ "main" ]
pull_request:
branches: [ "main" ]

jobs:
build-test:
runs-on: ubuntu-latest

```
steps:
- name: 📥 Checkout code
  uses: actions/checkout@v3

- name: 🐍 Setup Python
  uses: actions/setup-python@v4
  with:
    python-version: "3.11"

- name: 📦 Install dependencies
  run: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt

- name: 🔍 Lint check
  run: |
    pip install flake8
    flake8 . --exclude=myenv --max-line-length=120

- name: 🧪 Run tests
  run: |
    pip install pytest
    pytest || true   # don't fail if no tests yet

- name: 🏗 Build check
  run: |
    python -m py_compile main.py
    python -m py_compile server.py

- name: 🐳 Docker build (optional)
  run: |
    docker build -t ai-mcp-assistant . || true
```
